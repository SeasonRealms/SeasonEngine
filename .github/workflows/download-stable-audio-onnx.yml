name: Download Stable Audio 3 ONNX Bundle

on:
  workflow_dispatch:
    inputs:
      repo_id:
        description: "Hugging Face 模型仓库"
        required: true
        default: "stabilityai/stable-audio-3-optimized"
      revision:
        description: "分支 / tag / commit"
        required: true
        default: "main"
      subfolder:
        description: "需要下载的仓库子目录"
        required: true
        default: "onnx"
      artifact_name:
        description: "输出 zip / artifact 名称（不带 .zip）"
        required: true
        default: "stable-audio-3-optimized-onnx"

permissions:
  contents: read

jobs:
  bundle-onnx:
    runs-on: ubuntu-latest

    env:
      DOWNLOAD_DIR: download
      DIST_DIR: dist

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Hugging Face downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: >-
            hf-${{ runner.os }}-${{ github.event.inputs.repo_id }}-${{
            github.event.inputs.revision }}-${{ github.event.inputs.subfolder }}
          restore-keys: |
            hf-${{ runner.os }}-${{ github.event.inputs.repo_id }}-
            hf-${{ runner.os }}-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub

      - name: Download selected Hugging Face folder and build zip
        shell: python
        run: |
          import json
          import os
          import posixpath
          import zipfile
          from pathlib import Path
          from huggingface_hub import HfApi, hf_hub_download

          repo_id = "${{ github.event.inputs.repo_id }}".strip()
          revision = "${{ github.event.inputs.revision }}".strip()
          subfolder = "${{ github.event.inputs.subfolder }}".strip().strip("/")
          artifact_name = "${{ github.event.inputs.artifact_name }}".strip()

          download_root = Path(os.environ["DOWNLOAD_DIR"]).resolve()
          dist_root = Path(os.environ["DIST_DIR"]).resolve()
          bundle_root = download_root / artifact_name
          zip_path = dist_root / f"{artifact_name}.zip"
          manifest_path = dist_root / f"{artifact_name}.manifest.json"

          download_root.mkdir(parents=True, exist_ok=True)
          dist_root.mkdir(parents=True, exist_ok=True)
          bundle_root.mkdir(parents=True, exist_ok=True)

          api = HfApi()
          all_repo_files = list(
              api.list_repo_files(
                  repo_id=repo_id,
                  repo_type="model",
                  revision=revision,
              )
          )
          prefix = f"{subfolder}/" if subfolder else ""
          file_entries = [
              repo_path
              for repo_path in all_repo_files
              if repo_path == subfolder or repo_path.startswith(prefix)
          ]

          if not file_entries:
              raise RuntimeError(
                  f"No files found under '{subfolder}' in repo '{repo_id}' at revision '{revision}'."
              )

          print(f"Found {len(file_entries)} files under {subfolder}")

          downloaded = []
          total_size = 0

          for repo_path in sorted(file_entries):
              local_path = Path(
                  hf_hub_download(
                      repo_id=repo_id,
                      filename=repo_path,
                      revision=revision,
                      repo_type="model",
                      local_dir=str(bundle_root),
                  )
              ).resolve()

              try:
                  relative_in_bundle = local_path.relative_to(bundle_root)
              except ValueError:
                  # Fallback for future huggingface_hub path behavior changes.
                  relative_in_bundle = Path(*repo_path.split("/"))
                  target_path = bundle_root / relative_in_bundle
                  target_path.parent.mkdir(parents=True, exist_ok=True)
                  if local_path != target_path:
                      target_path.write_bytes(local_path.read_bytes())
                      local_path = target_path

              file_size = local_path.stat().st_size
              total_size += file_size
              downloaded.append(
                  {
                      "repo_path": repo_path,
                      "bundle_path": relative_in_bundle.as_posix(),
                      "size_bytes": file_size,
                  }
              )
              print(f"Downloaded: {repo_path} -> {relative_in_bundle.as_posix()}")

          with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              for item in sorted(bundle_root.rglob("*")):
                  if not item.is_file():
                      continue
                  if ".cache" in item.relative_to(bundle_root).parts:
                      continue
                  arcname = posixpath.join(artifact_name, item.relative_to(bundle_root).as_posix())
                  zf.write(item, arcname=arcname)
                  print(f"Packed: {arcname}")

          manifest = {
              "repo_id": repo_id,
              "revision": revision,
              "subfolder": subfolder,
              "artifact_name": artifact_name,
              "file_count": len(downloaded),
              "total_size_bytes": total_size,
              "zip_path": zip_path.name,
              "files": downloaded,
          }

          manifest_path.write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )

          print("")
          print("Bundle summary:")
          print(json.dumps(
              {
                  "repo_id": repo_id,
                  "revision": revision,
                  "subfolder": subfolder,
                  "file_count": len(downloaded),
                  "total_size_bytes": total_size,
                  "zip_size_bytes": zip_path.stat().st_size,
                  "zip_name": zip_path.name,
              },
              ensure_ascii=False,
              indent=2,
          ))

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.artifact_name }}
          path: |
            dist/${{ github.event.inputs.artifact_name }}.zip
            dist/${{ github.event.inputs.artifact_name }}.manifest.json
          if-no-files-found: error
