name: Build glslang (Android + Linux)

on:
  workflow_dispatch:
    inputs:
      glslang_ref:
        description: "glslang tag / branch / commit (e.g. 16.3.0 / main-tot)"
        required: true
        default: "16.3.0"
      android_api_level:
        description: "Minimum Android API level"
        required: true
        default: "24"

permissions:
  contents: read

jobs:
  # ============================================================
  # Android: 4 ABI cross-compiled with Android NDK on Linux x64.
  # Internal glslang targets are built as STATIC libraries and
  # then merged into a single libglslang.so via --whole-archive,
  # with libc++ statically embedded.
  # ============================================================
  build-android:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            clang_prefix: aarch64-linux-android

    env:
      ANDROID_NDK_VERSION: 26.3.11579264
      GLSLANG_DIR: glslang

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            python3 \
            python3-pip \
            cmake \
            ninja-build \
            unzip \
            wget

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK command-line tools
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O android-cmdline-tools.zip
          mkdir -p "$HOME/android-sdk/cmdline-tools"
          unzip -q android-cmdline-tools.zip -d "$HOME/android-sdk/cmdline-tools"
          mv "$HOME/android-sdk/cmdline-tools/cmdline-tools" "$HOME/android-sdk/cmdline-tools/latest"

          echo "ANDROID_HOME=$HOME/android-sdk" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> "$GITHUB_ENV"
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

      - name: Accept Android licenses and install NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Clone glslang
        run: |
          git clone https://github.com/KhronosGroup/glslang.git "${GLSLANG_DIR}"
          cd "${GLSLANG_DIR}"
          git checkout "${{ github.event.inputs.glslang_ref }}"

      - name: Sync glslang dependencies (SPIRV-Tools / SPIRV-Headers)
        run: |
          cd "${GLSLANG_DIR}"
          python3 ./update_glslang_sources.py

      - name: Configure glslang for Android ${{ matrix.abi }}
        run: |
          cmake -S "${GLSLANG_DIR}" -B "${GLSLANG_DIR}/build/android-${{ matrix.abi }}" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_ANDROID_NDK="${ANDROID_NDK_HOME}" \
            -DCMAKE_ANDROID_ARCH_ABI=${{ matrix.abi }} \
            -DCMAKE_ANDROID_API="${{ github.event.inputs.android_api_level }}" \
            -DCMAKE_ANDROID_STL_TYPE=c++_static \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DENABLE_HLSL=OFF \
            -DENABLE_RTTI=OFF \
            -DENABLE_OPT=OFF \
            -DENABLE_SPVREMAPPER=OFF \
            -DENABLE_GLSLANG_BINARIES=OFF \
            -DGLSLANG_TESTS=OFF \
            -DGLSLANG_ENABLE_INSTALL=OFF

      - name: Build glslang static libraries
        run: |
          cmake --build "${GLSLANG_DIR}/build/android-${{ matrix.abi }}" --config Release -j

      - name: Merge static libraries into a single libglslang.so
        run: |
          BUILD_DIR="${GLSLANG_DIR}/build/android-${{ matrix.abi }}"
          OUT="out/${{ matrix.abi }}"
          mkdir -p "$OUT"

          # Collect every produced static archive.
          LIBS=$(find "$BUILD_DIR" -name "*.a" -printf "%p ")
          if [ -z "$LIBS" ]; then
            echo "::error::No static archives produced under $BUILD_DIR"
            exit 1
          fi
          echo "Static archives to merge:"
          echo "$LIBS" | tr ' ' '\n'

          TC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"
          API="${{ github.event.inputs.android_api_level }}"
          CXX="${TC}/bin/${{ matrix.clang_prefix }}${API}-clang++"

          if [ ! -x "$CXX" ]; then
            echo "::error::clang++ wrapper not found: $CXX"
            ls -la "${TC}/bin" | grep clang || true
            exit 1
          fi

          # --whole-archive forces every object inside the static archives to be
          # pulled into the resulting shared library, so the C interface symbols
          # (glslang_*) and default-resource symbols are all preserved.
          # --allow-multiple-definition tolerates the stub_library_function()
          # placeholder that glslang adds to every CMake target (CMake requires
          # each add_library to have at least one source file); without this
          # flag --whole-archive triggers duplicate-symbol errors.
          # -static-libstdc++ embeds libc++ inside libglslang.so, freeing the APK
          # from shipping libc++_shared.so.
          "$CXX" -shared -fPIC -fuse-ld=lld -O2 \
            -Wl,--whole-archive $LIBS -Wl,--no-whole-archive \
            -Wl,--allow-multiple-definition \
            -static-libstdc++ \
            -Wl,--build-id=sha1 \
            -o "$OUT/libglslang.so"

          echo "==== artifact contents ===="
          ls -la "$OUT"
          file "$OUT/libglslang.so" || true
          du -h "$OUT/libglslang.so"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glslang-android-${{ matrix.abi }}
          path: out/${{ matrix.abi }}/
          if-no-files-found: error

  # ============================================================
  # Linux: native build on x64 + arm64 GitHub-hosted runners.
  # Internal glslang targets are built as STATIC libraries and
  # then merged into a single libglslang.so via --whole-archive.
  # ============================================================
  build-linux:
    name: build-linux-${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-latest
          - rid: linux-arm64
            runner: ubuntu-24.04-arm

    env:
      GLSLANG_DIR: glslang

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            python3 \
            python3-pip \
            build-essential \
            cmake \
            ninja-build

      - name: Clone glslang
        run: |
          git clone https://github.com/KhronosGroup/glslang.git "${GLSLANG_DIR}"
          cd "${GLSLANG_DIR}"
          git checkout "${{ github.event.inputs.glslang_ref }}"

      - name: Sync glslang dependencies (SPIRV-Tools / SPIRV-Headers)
        run: |
          cd "${GLSLANG_DIR}"
          python3 ./update_glslang_sources.py

      - name: Configure glslang for ${{ matrix.rid }}
        run: |
          cmake -S "${GLSLANG_DIR}" -B "${GLSLANG_DIR}/build/${{ matrix.rid }}" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DENABLE_HLSL=OFF \
            -DENABLE_RTTI=OFF \
            -DENABLE_OPT=OFF \
            -DENABLE_SPVREMAPPER=OFF \
            -DENABLE_GLSLANG_BINARIES=OFF \
            -DGLSLANG_TESTS=OFF \
            -DGLSLANG_ENABLE_INSTALL=OFF

      - name: Build glslang static libraries
        run: |
          cmake --build "${GLSLANG_DIR}/build/${{ matrix.rid }}" --config Release -j

      - name: Merge static libraries into a single libglslang.so
        run: |
          BUILD_DIR="${GLSLANG_DIR}/build/${{ matrix.rid }}"
          OUT="out/${{ matrix.rid }}"
          mkdir -p "$OUT"

          LIBS=$(find "$BUILD_DIR" -name "*.a" -printf "%p ")
          if [ -z "$LIBS" ]; then
            echo "::error::No static archives produced under $BUILD_DIR"
            exit 1
          fi
          echo "Static archives to merge:"
          echo "$LIBS" | tr ' ' '\n'

          # System g++ links against the system libstdc++.so.6 (kept as a dynamic
          # dependency on Linux desktops, which is the conventional behaviour).
          # --allow-multiple-definition tolerates glslang's stub_library_function()
          # placeholder duplicated across every internal target (see Android job
          # for context).
          g++ -shared -fPIC -O2 \
            -Wl,--whole-archive $LIBS -Wl,--no-whole-archive \
            -Wl,--allow-multiple-definition \
            -Wl,--build-id=sha1 \
            -o "$OUT/libglslang.so"

          echo "==== artifact contents ===="
          ls -la "$OUT"
          file "$OUT/libglslang.so" || true
          du -h "$OUT/libglslang.so"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glslang-${{ matrix.rid }}
          path: out/${{ matrix.rid }}/
          if-no-files-found: error
