name: Build glslang (Android + Linux)

on:
  workflow_dispatch:
    inputs:
      glslang_ref:
        description: "glslang tag / branch / commit (e.g. 16.3.0 / main-tot)"
        required: true
        default: "16.3.0"
      android_api_level:
        description: "Minimum Android API level"
        required: true
        default: "24"

permissions:
  contents: read

jobs:
  # ============================================================
  # Android: 4 ABI cross-compiled with Android NDK on Linux x64.
  # Internal glslang targets are built as STATIC libraries and
  # then merged into a single libglslang.so via --whole-archive,
  # with libc++ statically embedded.
  # ============================================================
  build-android:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            clang_prefix: aarch64-linux-android

    env:
      ANDROID_NDK_VERSION: 26.3.11579264
      GLSLANG_DIR: glslang

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            python3 \
            python3-pip \
            cmake \
            ninja-build \
            unzip \
            wget

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK command-line tools
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O android-cmdline-tools.zip
          mkdir -p "$HOME/android-sdk/cmdline-tools"
          unzip -q android-cmdline-tools.zip -d "$HOME/android-sdk/cmdline-tools"
          mv "$HOME/android-sdk/cmdline-tools/cmdline-tools" "$HOME/android-sdk/cmdline-tools/latest"

          echo "ANDROID_HOME=$HOME/android-sdk" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> "$GITHUB_ENV"
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

      - name: Accept Android licenses and install NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Clone glslang
        run: |
          git clone https://github.com/KhronosGroup/glslang.git "${GLSLANG_DIR}"
          cd "${GLSLANG_DIR}"
          git checkout "${{ github.event.inputs.glslang_ref }}"

      - name: Sync glslang dependencies (SPIRV-Tools / SPIRV-Headers)
        run: |
          cd "${GLSLANG_DIR}"
          python3 ./update_glslang_sources.py

      - name: Configure glslang for Android ${{ matrix.abi }}
        run: |
          # Why three visibility-related knobs:
          # 1) GLSLANG_IS_SHARED_LIBRARY makes the GLSLANG_EXPORT macro in
          #    glslang_c_interface.h expand to __attribute__((visibility("default"))),
          #    attaching default-visibility at *function granularity*. This is
          #    the only way to win against glslang's internal CMakeLists, which
          #    forces -fvisibility=hidden via target_compile_options(... PRIVATE)
          #    (PRIVATE overrides CMAKE_CXX_VISIBILITY_PRESET).
          # 2) CMAKE_*_VISIBILITY_PRESET=default keeps the *non-EXPORT* helpers
          #    (e.g. glslang_default_resource lives in a separate target) visible.
          # 3) Once the .o is born hidden, neither --version-script nor
          #    --export-dynamic can promote it back to global, so we must fix
          #    visibility at compile time, not link time.
          cmake -S "${GLSLANG_DIR}" -B "${GLSLANG_DIR}/build/android-${{ matrix.abi }}" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_ANDROID_NDK="${ANDROID_NDK_HOME}" \
            -DCMAKE_ANDROID_ARCH_ABI=${{ matrix.abi }} \
            -DCMAKE_ANDROID_API="${{ github.event.inputs.android_api_level }}" \
            -DCMAKE_ANDROID_STL_TYPE=c++_static \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_C_VISIBILITY_PRESET=default \
            -DCMAKE_CXX_VISIBILITY_PRESET=default \
            -DCMAKE_VISIBILITY_INLINES_HIDDEN=OFF \
            -DCMAKE_C_FLAGS="-DGLSLANG_IS_SHARED_LIBRARY=1" \
            -DCMAKE_CXX_FLAGS="-DGLSLANG_IS_SHARED_LIBRARY=1" \
            -DBUILD_SHARED_LIBS=OFF \
            -DENABLE_HLSL=OFF \
            -DENABLE_RTTI=OFF \
            -DENABLE_OPT=OFF \
            -DENABLE_SPVREMAPPER=OFF \
            -DENABLE_GLSLANG_BINARIES=OFF \
            -DGLSLANG_TESTS=OFF \
            -DGLSLANG_ENABLE_INSTALL=OFF

      - name: Build glslang static libraries
        run: |
          cmake --build "${GLSLANG_DIR}/build/android-${{ matrix.abi }}" --config Release -j

      - name: Merge static libraries into a single libglslang.so
        run: |
          BUILD_DIR="${GLSLANG_DIR}/build/android-${{ matrix.abi }}"
          OUT="out/${{ matrix.abi }}"
          mkdir -p "$OUT"

          # Collect every produced static archive.
          LIBS=$(find "$BUILD_DIR" -name "*.a" -printf "%p ")
          if [ -z "$LIBS" ]; then
            echo "::error::No static archives produced under $BUILD_DIR"
            exit 1
          fi
          echo "Static archives to merge:"
          echo "$LIBS" | tr ' ' '\n'

          TC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"
          API="${{ github.event.inputs.android_api_level }}"
          CXX="${TC}/bin/${{ matrix.clang_prefix }}${API}-clang++"

          if [ ! -x "$CXX" ]; then
            echo "::error::clang++ wrapper not found: $CXX"
            ls -la "${TC}/bin" | grep clang || true
            exit 1
          fi

          # --whole-archive forces every object inside the static archives to be
          # pulled into the resulting shared library, so the C interface symbols
          # (glslang_*) and default-resource symbols are all preserved.
          # --allow-multiple-definition tolerates the stub_library_function()
          # placeholder that glslang adds to every CMake target (CMake requires
          # each add_library to have at least one source file); without this
          # flag --whole-archive triggers duplicate-symbol errors.
          # -static-libstdc++ embeds libc++ inside libglslang.so, freeing the APK
          # from shipping libc++_shared.so.
          "$CXX" -shared -fPIC -fuse-ld=lld -O2 \
            -Wl,--whole-archive $LIBS -Wl,--no-whole-archive \
            -Wl,--allow-multiple-definition \
            -static-libstdc++ \
            -Wl,--build-id=sha1 \
            -o "$OUT/libglslang.so"

          echo "==== artifact contents ===="
          ls -la "$OUT"
          file "$OUT/libglslang.so" || true
          du -h "$OUT/libglslang.so"

      - name: Verify exported symbols
        run: |
          OUT="out/${{ matrix.abi }}"
          NM="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-nm"
          echo "==== exported glslang_* symbols ===="
          "$NM" -D --defined-only "$OUT/libglslang.so" | grep -E ' T glslang_' || true
          COUNT=$("$NM" -D --defined-only "$OUT/libglslang.so" | grep -E ' T glslang_' | wc -l)
          echo "Total glslang_* exports: $COUNT"
          if [ "$COUNT" -lt 15 ]; then
            echo "::error::libglslang.so is missing glslang_* exports (got $COUNT, expected >=15)"
            exit 1
          fi
          # Sanity: the very first symbol the runtime asks for.
          "$NM" -D --defined-only "$OUT/libglslang.so" | grep -q ' T glslang_initialize_process' \
            || { echo "::error::glslang_initialize_process is NOT exported"; exit 1; }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glslang-android-${{ matrix.abi }}
          path: out/${{ matrix.abi }}/
          if-no-files-found: error

  # ============================================================
  # Linux: native build on x64 + arm64 GitHub-hosted runners.
  # Internal glslang targets are built as STATIC libraries and
  # then merged into a single libglslang.so via --whole-archive.
  # ============================================================
  build-linux:
    name: build-linux-${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-latest
          - rid: linux-arm64
            runner: ubuntu-24.04-arm

    env:
      GLSLANG_DIR: glslang

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            python3 \
            python3-pip \
            build-essential \
            clang \
            lld \
            cmake \
            ninja-build

      - name: Clone glslang
        run: |
          git clone https://github.com/KhronosGroup/glslang.git "${GLSLANG_DIR}"
          cd "${GLSLANG_DIR}"
          git checkout "${{ github.event.inputs.glslang_ref }}"

      - name: Sync glslang dependencies (SPIRV-Tools / SPIRV-Headers)
        run: |
          cd "${GLSLANG_DIR}"
          python3 ./update_glslang_sources.py

      - name: Configure glslang for ${{ matrix.rid }}
        env:
          CC: clang
          CXX: clang++
        run: |
          # Linux job is intentionally aligned with the Android job's toolchain
          # (clang + lld) because:
          # 1) GCC has a long history of edge cases where
          #    __attribute__((visibility("default"))) on extern "C" function
          #    bodies fails to override a command-line -fvisibility=hidden
          #    when -O2/LTO inlining kicks in (cf. GCC PR70435 etc.).
          # 2) Switching to clang/lld makes the Linux .so's symbol-export
          #    behaviour byte-for-byte identical to the proven-working Android
          #    .so, eliminating the only environmental variable.
          # 3) -fvisibility=default in CMAKE_*_FLAGS is a belt-and-suspenders
          #    backstop in case glslang's CMakeLists ever re-introduces a
          #    target_compile_options(... PRIVATE -fvisibility=hidden) line.
          cmake -S "${GLSLANG_DIR}" -B "${GLSLANG_DIR}/build/${{ matrix.rid }}" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_C_VISIBILITY_PRESET=default \
            -DCMAKE_CXX_VISIBILITY_PRESET=default \
            -DCMAKE_VISIBILITY_INLINES_HIDDEN=OFF \
            -DCMAKE_C_FLAGS="-fvisibility=default -DGLSLANG_IS_SHARED_LIBRARY=1" \
            -DCMAKE_CXX_FLAGS="-fvisibility=default -DGLSLANG_IS_SHARED_LIBRARY=1" \
            -DBUILD_SHARED_LIBS=OFF \
            -DENABLE_HLSL=OFF \
            -DENABLE_RTTI=OFF \
            -DENABLE_OPT=OFF \
            -DENABLE_SPVREMAPPER=OFF \
            -DENABLE_GLSLANG_BINARIES=OFF \
            -DGLSLANG_TESTS=OFF \
            -DGLSLANG_ENABLE_INSTALL=OFF

      - name: Build glslang static libraries
        run: |
          cmake --build "${GLSLANG_DIR}/build/${{ matrix.rid }}" --config Release -j

      - name: Merge static libraries into a single libglslang.so
        run: |
          BUILD_DIR="${GLSLANG_DIR}/build/${{ matrix.rid }}"
          OUT="out/${{ matrix.rid }}"
          mkdir -p "$OUT"

          LIBS=$(find "$BUILD_DIR" -name "*.a" -printf "%p ")
          if [ -z "$LIBS" ]; then
            echo "::error::No static archives produced under $BUILD_DIR"
            exit 1
          fi
          echo "Static archives to merge:"
          echo "$LIBS" | tr ' ' '\n'

          # Linker invocation mirrors the Android job: clang++ + lld with
          # libstdc++ statically embedded. Why -static-libstdc++ on Linux too:
          # the runner is ubuntu-latest (currently 24.04, libstdc++ 14) but
          # consumers may run Ubuntu 22.04 / Debian 12 etc. with older
          # libstdc++. Statically embedding libstdc++ frees libglslang.so from
          # GLIBCXX/CXXABI version dependencies on the host system.
          # -Wl,--exclude-libs,ALL prevents libstdc++ internal symbols from
          # being re-exported via libglslang.so's dynsym table.
          clang++ -shared -fPIC -fuse-ld=lld -O2 \
            -Wl,--whole-archive $LIBS -Wl,--no-whole-archive \
            -Wl,--allow-multiple-definition \
            -static-libstdc++ -static-libgcc \
            -Wl,--exclude-libs,ALL \
            -Wl,--build-id=sha1 \
            -o "$OUT/libglslang.so"

          echo "==== artifact contents ===="
          ls -la "$OUT"
          file "$OUT/libglslang.so" || true
          du -h "$OUT/libglslang.so"

      - name: Verify exported symbols
        run: |
          OUT="out/${{ matrix.rid }}"
          echo "==== exported glslang_* symbols ===="
          nm -D --defined-only "$OUT/libglslang.so" | grep -E ' T glslang_' || true
          COUNT=$(nm -D --defined-only "$OUT/libglslang.so" | grep -E ' T glslang_' | wc -l)
          echo "Total glslang_* exports: $COUNT"
          if [ "$COUNT" -lt 15 ]; then
            echo "::error::libglslang.so is missing glslang_* exports (got $COUNT, expected >=15)"
            exit 1
          fi
          nm -D --defined-only "$OUT/libglslang.so" | grep -q ' T glslang_initialize_process' \
            || { echo "::error::glslang_initialize_process is NOT exported"; exit 1; }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glslang-${{ matrix.rid }}
          path: out/${{ matrix.rid }}/
          if-no-files-found: error
