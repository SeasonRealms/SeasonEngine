name: Download Qwen3-TTS ONNX Bundle

on:
  workflow_dispatch:
    inputs:
      model_variant:
        description: "选择需要下载的 Qwen3-TTS ONNX 模型"
        type: choice
        required: true
        default: "qwen3-tts-12hz-0.6b-customvoice"
        options:
          - qwen3-tts-12hz-0.6b-customvoice
          - qwen3-tts-12hz-1.7b-customvoice
          - qwen3-tts-12hz-0.6b-base
      revision:
        description: "Hugging Face 分支 / tag / commit"
        required: true
        default: "main"

permissions:
  contents: read

jobs:
  download-model:
    runs-on: ubuntu-latest

    env:
      OUT_DIR: out

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Hugging Face downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: >-
            hf-${{ runner.os }}-${{ github.event.inputs.model_variant }}-${{ github.event.inputs.revision }}
          restore-keys: |
            hf-${{ runner.os }}-${{ github.event.inputs.model_variant }}-
            hf-${{ runner.os }}-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub

      - name: Download selected Qwen3-TTS model files
        shell: python
        env:
          MODEL_VARIANT: ${{ github.event.inputs.model_variant }}
          REVISION: ${{ github.event.inputs.revision }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          import json
          import os
          import shutil
          from pathlib import Path
          from huggingface_hub import snapshot_download

          variants = {
              "qwen3-tts-12hz-0.6b-customvoice": {
                  "repo_id": "elbruno/Qwen3-TTS-12Hz-0.6B-CustomVoice-ONNX",
              },
              "qwen3-tts-12hz-1.7b-customvoice": {
                  "repo_id": "elbruno/Qwen3-TTS-12Hz-1.7B-CustomVoice-ONNX",
              },
              "qwen3-tts-12hz-0.6b-base": {
                  "repo_id": "elbruno/Qwen3-TTS-12Hz-0.6B-Base-ONNX",
              },
          }

          model_variant = os.environ["MODEL_VARIANT"].strip()
          revision = os.environ["REVISION"].strip()
          out_dir = Path(os.environ["OUT_DIR"]).resolve()
          out_dir.mkdir(parents=True, exist_ok=True)

          if model_variant not in variants:
              raise RuntimeError(f"Unsupported model variant: {model_variant}")

          config = variants[model_variant]
          repo_id = config["repo_id"]

          snapshot_download(
              repo_id=repo_id,
              repo_type="model",
              revision=revision,
              local_dir=str(out_dir),
              token=os.getenv("HF_TOKEN") or None,
          )

          cache_dir = out_dir / ".cache"
          if cache_dir.exists():
              shutil.rmtree(cache_dir)

          files = []
          total_size = 0
          for path in sorted(out_dir.rglob("*")):
              if not path.is_file():
                  continue
              rel = path.relative_to(out_dir).as_posix()
              size = path.stat().st_size
              total_size += size
              files.append({
                  "path": rel,
                  "size_bytes": size,
              })
              print(f"Downloaded: {rel} ({size} bytes)")

          manifest = {
              "model_variant": model_variant,
              "repo_id": repo_id,
              "revision": revision,
              "downloaded_file_count": len(files),
              "download_mode": "full_repository_snapshot",
              "total_size_bytes": total_size,
              "files": files,
          }

          (out_dir / "season-qwen-tts-download.manifest.json").write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )

          print("")
          print("Download summary:")
          print(json.dumps(
              {
                  "model_variant": model_variant,
                  "repo_id": repo_id,
                  "revision": revision,
                  "downloaded_file_count": len(files),
                  "download_mode": "full_repository_snapshot",
                  "total_size_bytes": total_size,
              },
              ensure_ascii=False,
              indent=2,
          ))

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.model_variant }}-onnx
          path: out/
          if-no-files-found: error
